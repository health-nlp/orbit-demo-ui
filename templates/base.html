<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Orbit{% endblock %}</title>
    <style>
        html, body {
            min-height: 100%;
            width: 100%;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: #fff;
        }
        header {
            background: #1a1a2e;
            color: white;
            width: 100%;
            padding: 1rem 1.5rem;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            width: min(1200px, 100%);
            margin: 0 auto;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .logo a {
            color: white;
            text-decoration: none;
        }
        .nav-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .nav-tabs a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
        }
        .nav-tabs a:hover,
        .nav-tabs a.active {
            background: #16213e;
        }
        main {
            max-width: 1200px;
            width: min(1200px, 100%);
            margin: 0 auto;
            padding: 2rem 1.5rem;
            flex: 1;
        }
        .hero {
            text-align: center;
            padding: 4rem 0;
        }
        .hero h1 {
            font-size: clamp(2rem, 4vw, 2.75rem);
            margin-bottom: 1rem;
            color: #1a1a2e;
        }
        .hero p {
            font-size: 1.1rem;
            color: #666;
            max-width: 700px;
            margin: 0 auto 2rem;
        }
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #1a1a2e;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin: 0.5rem;
        }
        .btn:hover {
            background: #16213e;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }
        .feature {
            padding: 1.5rem;
            border: 1px solid #eee;
            border-radius: 8px;
            background: #fff;
        }
        .feature h3 {
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }
        footer {
            text-align: center;
            padding: 2rem 1.5rem;
            background: #f5f5f5;
            margin-top: 3rem;
            width: 100%;
        }
        footer a {
            color: #1a1a2e;
            text-decoration: none;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="/">Orbit</a></div>
            <div class="nav-tabs">
                <a href="/docs">Docs</a>
                <a href="https://github.com/health-nlp/orbit">Code</a>
                <a href="/contributors">Contributors</a>
            </div>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>This work is licensed under a <a href="https://creativecommons.org/licenses/by/4.0/">Creative Commons Attribution 4.0 International License</a>.</p>
        <!--  TODO: Accessibility. Imprint. Data Protection. -->
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
